<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Lab Management - Tata Motors</title>
    <!-- TailwindCSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet"/>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-[#F8FAFC]">

<!-- Navigation Bar -->
<nav class="bg-white border-b border-[#E2E8F0] h-16">
    <div class="max-w-[1400px] mx-auto px-6 h-full flex items-center justify-between">
        <div class="flex items-center gap-8">
            <div class="text-xl font-bold text-[#1E293B]">
                Tata Motors Lab Booking
            </div>
            <div class="flex gap-6">
                <a class="text-[15px] font-semibold text-[#64748B]">Dashboard</a>
                <a class="text-[15px] font-semibold text-[#64748B]">Bookings</a>
                <a class="text-[15px] font-semibold text-[#0066CC]">Lab Management</a>
                <a class="text-[15px] font-semibold text-[#64748B]">Users</a>
                <a class="text-[15px] font-semibold text-[#64748B]">Analytics</a>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <div class="text-right">
                <div class="text-[15px] font-semibold text-[#1E293B]">Admin User</div>
                <div class="text-[13px] text-[#64748B]">admin@tatamotors.com</div>
            </div>
            <div class="w-10 h-10 rounded-full bg-[#0066CC] flex items-center justify-center text-white font-semibold">AU</div>
        </div>
    </div>
</nav>

<!-- Main Content -->
<div class="max-w-[1400px] mx-auto px-6 pb-8">

    <div class="flex items-center justify-between mb-6">
        <div>
            <h1 class="text-[28px] font-bold text-[#1E293B] mb-2">Lab Management</h1>
            <p class="text-[15px] text-[#64748B]">Manage lab and classroom inventory with complete facility details</p>
        </div>
        <button class="bg-[#0066CC] text-white text-[15px] font-semibold px-6 py-3 rounded-lg">+ Add New Lab</button>
    </div>

    <div class="bg-white rounded-xl border border-[#E2E8F0] shadow-sm">
        <div class="p-5 border-b border-[#E2E8F0] flex items-center justify-between">
            <div class="flex items-center gap-4">
                <input class="border border-[#E2E8F0] rounded-lg px-4 py-2.5 text-[15px] w-80" placeholder="Search labs..." type="text"/>
                <select class="border border-[#E2E8F0] rounded-lg px-4 py-2.5 text-[15px]">
                    <option>All Types</option>
                    <option>Lab</option>
                    <option>Classroom</option>
                </select>
                <select class="border border-[#E2E8F0] rounded-lg px-4 py-2.5 text-[15px]">
                    <option>All Status</option>
                    <option>Available</option>
                    <option>Unavailable</option>
                </select>
            </div>
            <div class="text-[13px] text-[#64748B]">
                Showing <span class="font-semibold text-[#1E293B]">12</span> labs
            </div>
        </div>

        <table class="w-full">
            <thead>
                <tr class="bg-[#F8FAFC] border-b border-[#E2E8F0]">
                    <th class="text-left px-6 py-4 text-[13px] font-semibold text-[#1E293B]">LAB NAME</th>
                    <th class="text-left px-6 py-4 text-[13px] font-semibold text-[#1E293B]">TYPE</th>
                    <th class="text-left px-6 py-4 text-[13px] font-semibold text-[#1E293B]">CAPACITY</th>
                    <th class="text-left px-6 py-4 text-[13px] font-semibold text-[#1E293B]">FACILITIES</th>
                    <th class="text-left px-6 py-4 text-[13px] font-semibold text-[#1E293B]">AVAILABILITY</th>
                    <th class="text-left px-6 py-4 text-[13px] font-semibold text-[#1E293B]">STATUS</th>
                    <th class="text-right px-6 py-4 text-[13px] font-semibold text-[#1E293B]">ACTIONS</th>
                </tr>
            </thead>
            <tbody>
                <!-- Lab rows will be injected dynamically by JS -->
            </tbody>
        </table>
    </div>
</div>

<!-- JavaScript: Backend Integration -->
<script type="module" th:src="@{/js/lab-management.js}"></script>

</body>
</html>
