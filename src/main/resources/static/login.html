<!DOCTYPE html>
<html lang="en">
 <head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>
   Login - Tata Motors Booking System
  </title>
  <script src="https://cdn.tailwindcss.com">
  </script>
  <link href="https://fonts.googleapis.com" rel="preconnect"/>
  <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
  <style>
   body { font-family: 'Inter', sans-serif; }
  </style>
 </head>
 <body class="bg-[#F8FAFC] min-h-screen">
  <!--- START: Header --->
    <header class="bg-white border-b border-[#E2E8F0] shadow-sm">
   <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
    <div class="flex items-center">
     <div>
      <div class="text-[#1A2332] text-xl font-bold tracking-tight">Skill Development Center</div>
      <div class="text-[#64748B] text-xs font-medium">Tata Motors</div>
     </div>
    </div>
   </div>
  </header>
  <!--- END --->
  <!--- START: Main Content --->
    <main class="max-w-7xl mx-auto px-6 py-12">
   <div class="text-center mb-12">
    <h1 class="text-[32px] font-bold text-[#1A2332] tracking-[-0.5px] mb-3">
     Welcome to Tata Motors
    </h1>
    <p class="text-[15px] text-[#64748B] leading-relaxed">
     Login to access the booking system
    </p>
   </div>
   <div class="max-w-lg mx-auto">
    <div class="bg-white rounded-xl shadow-[0_2px_8px_rgba(26,35,50,0.06)] p-8">
     <form>
      <div class="mb-6">
       <label class="block text-[14px] font-medium text-[#1A2332] tracking-[0.5px] uppercase mb-2">
        Login Type
       </label>
       <div class="grid grid-cols-2 gap-3">
        <label class="relative">
         <input class="peer sr-only" name="loginType" type="radio" value="staff" checked/>
         <div class="flex flex-col items-center justify-center p-4 bg-white border-[1.5px] border-[#E2E8F0] rounded-lg peer-checked:border-[#0047AB] peer-checked:bg-[#0047AB]/5 cursor-pointer">
          <div class="w-10 h-10 rounded-xl bg-[#0047AB]/10 flex items-center justify-center mb-2">
           <svg class="w-5 h-5 text-[#0047AB]" fill="none" stroke="currentColor" stroke-width="2" viewbox="0 0 24 24">
            <path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" stroke-linecap="round" stroke-linejoin="round">
            </path>
           </svg>
          </div>
          <span class="text-[14px] font-medium text-[#1A2332]">
           Staff
          </span>
         </div>
        </label>
        <label class="relative">
         <input class="peer sr-only" name="loginType" type="radio" value="admin"/>
         <div class="flex flex-col items-center justify-center p-4 bg-white border-[1.5px] border-[#E2E8F0] rounded-lg peer-checked:border-[#FFB800] peer-checked:bg-[#FFB800]/5 cursor-pointer">
          <div class="w-10 h-10 rounded-xl bg-[#FFB800]/10 flex items-center justify-center mb-2">
           <svg class="w-5 h-5 text-[#FFB800]" fill="none" stroke="currentColor" stroke-width="2" viewbox="0 0 24 24">
            <path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" stroke-linecap="round" stroke-linejoin="round">
            </path>
           </svg>
          </div>
          <span class="text-[14px] font-medium text-[#1A2332]">
           Administrator
          </span>
         </div>
        </label>
       </div>
      </div>
      <div class="mb-5">
       <label class="block text-[14px] font-medium text-[#1A2332] tracking-[0.5px] uppercase mb-2">
        Username
       </label>
       <input class="w-full px-4 py-3 bg-white border-[1.5px] border-[#E2E8F0] rounded-lg text-[15px] text-[#1A2332]" placeholder="Enter your username" type="text"/>
      </div>
      <div class="mb-5">
       <label class="block text-[14px] font-medium text-[#1A2332] tracking-[0.5px] uppercase mb-2">
        Password
       </label>
       <input class="w-full px-4 py-3 bg-white border-[1.5px] border-[#E2E8F0] rounded-lg text-[15px] text-[#1A2332]" placeholder="Enter your password" type="password"/>
      </div>
      <div class="flex items-center mb-6">
       <input class="w-4 h-4 border-[1.5px] border-[#E2E8F0] rounded" id="remember-me" type="checkbox"/>
       <label class="ml-2 text-[13px] text-[#64748B]" for="remember-me">
        Remember me for 30 days
       </label>
      </div>
      <button class="w-full bg-[#0047AB] text-white text-[15px] font-medium py-3 px-6 rounded-lg" type="submit">
       Login
      </button>
      <div class="mt-4 text-center">
       <a class="text-[13px] text-[#0047AB] font-medium">
        Forgot your password?
       </a>
      </div>
     </form>
    </div>
   </div>
  </main>
  <!--- END --->
  <!--- START: Footer --->
    <footer class="max-w-7xl mx-auto px-6 py-8 mt-12 border-t border-[#E2E8F0]">
   <div class="flex flex-col md:flex-row justify-between items-center gap-4">
    <div class="text-[13px] text-[#64748B]">
     © 2024 Tata Motors Limited. All rights reserved.
    </div>
    <div class="flex gap-6 text-[13px] text-[#64748B]">
     <a>
      Privacy Policy
     </a>
     <a>
      Terms of Service
     </a>
     <a>
      System Status
     </a>
    </div>
   </div>
  </footer>
  <!--- END --->
 </body>
</html>
